<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
    <title>Github issue Tracker</title>
</head>
<body>
    
<div  class="bg-slate-200 ">

        <header class="flex  w-10/12 mx-auto mb-3  items-start mt-5 bg-white shadow-md p-4 gap-2">
<button class="btn btn-primary px-13">All</button>
  <button class="btn btn-neutral btn-outline px-8">Open</button>
  <button class="btn btn-neutral btn-outline px-5">Closed</button>
        </header>
        <section class="title p-3 mb-6 bg-white shadow-md  w-10/12 mx-auto flex justify-between ">
         <div class="flex flex-row gap-2">
            <img class="rounded-full bg-gray-300 p-2 flex items-center justify-center" src="assets/Aperture.png" alt="">
            <div class="">
                <h4 class="font-bold ">50 Issues</h4>
                <p class="text-zinc-400 text-sm">Track and manage your project issues</p>
                
            </div>


         </div>
            <div class="grid grid-cols-2 gap-3 items-center ">
                <p class="flex gap-1">
                    <img src="assets/Open-Status.png" alt="">Open
                </p>
                <p class="flex gap-1"><img src="assets/Closed- Status .png" alt="">Closed</p>
            </div>

        </section>
     




</div>

   <div  id="card-container" class="p-4 mb-3 shadow-md  w-10/12 mx-auto">
<div id="card-${card.id}" class="card space-y-2 w-72 p-2 shadow-xl border-t-green-500 border-t-2">
    <div class=" flex justify-between">
        <img id="card-image" src="assets/Open-Status.png" alt="">
        <div  id="card-badge"  class="badge badge-soft badge-error px-4 rounded-full">HIGH</div>
    </div>
    <h2 id="card-title" class="font-bold text-lg">Fix navigation menu on mobile devices</h2>
    <p id="card-des" class="text-gray-400">The navigation menu doesn't collapse properly on mobile devices...</p>
    <div id="show" class="flex gap-2">
        <div class="badge badge-outline badge-error rounded-full">BUG</div>
        <div class="badge badge-outline badge-warning rounded-full">HELP WANTED</div>

    </div>
    <div class=" my-2  border-t border-t-gray-400 ">
            <p class="text-sm text-gray-500 mb-1 mt-2">#1 by john_doe</p>
            <p class="text-sm text-gray-500 " >1/15/2024</p>
        </div>
</div>
        </div>



























<script>
  fetch("https://phi-lab-server.vercel.app/api/v1/lab/issues")
    .then(res => res.json())
    .then(data => { displayCard(data.data) });

  function displayCard(cards) {
    let cardContainer = document.getElementById("card-container");
    cardContainer.innerHTML = "";

    for (let card of cards) {

      // Priority badge
      let badgeHTML = "";
      if (card.priority === "high") {
        badgeHTML = `<div class="badge badge-soft badge-error px-4 rounded-full">HIGH</div>`;
      } else if (card.priority === "medium") {
        badgeHTML = `<div class="badge badge-soft badge-warning px-4 rounded-full">MEDIUM</div>`;
      } else {
        badgeHTML = `<div class="badge badge-ghost px-4 rounded-full">LOW</div>`;
      }

      // Status image
      let imgSrc = card.status === "closed"
        ? "assets/Closed- Status .png"
        : "assets/Open-Status.png";

      // Labels/tags
      let labelsHTML = "";
      if (card.labels && card.labels.length > 0) {
        labelsHTML = card.labels.map(label =>
          `<div class="badge badge-outline badge-error rounded-full">${label}</div>`
        ).join("");
      }

      // Date formatting
      let date = new Date(card.created_at).toLocaleDateString();

      cardContainer.innerHTML += `
        <div class="card space-y-2 w-72 p-2 shadow-xl border-t-green-500 border-t-2">
          <div class="flex justify-between">
            <img src="${imgSrc}" alt="status">
            ${badgeHTML}
          </div>
          <h2 class="font-bold text-lg">${card.title}</h2>
          <p class="text-gray-400">${card.description}</p>
          <div class="flex gap-2">
            ${labelsHTML}
          </div>
          <div class="my-2 border-t border-t-gray-400">
            <p class="text-sm text-gray-500 mb-1 mt-2">#${card.id} by ${card.author}</p>
            <p class="text-sm text-gray-500">${date}</p>
          </div>
        </div>
      `;
    }
  }
</script>
</body>
</html>
