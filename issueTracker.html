<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
    <title>Github issue Tracker</title>
</head>
<body>
    
<div  class="bg-slate-200 ">

        <header class="flex  w-10/12 mx-auto mb-2  items-start mt-5 bg-white shadow-md p-4 gap-2">
<button class="btn btn-primary px-13">All</button>
  <button class="btn btn-neutral btn-outline px-8">Open</button>
  <button class="btn btn-neutral btn-outline px-5">Closed</button>
        </header>
        <section class="title  bg-white shadow-md p-2 w-10/12 mx-auto flex justify-between ">
         <div class="flex flex-row gap-2">
            <img class="rounded-full bg-gray-300 p-2 flex items-center justify-center" src="assets/Aperture.png" alt="">
            <div class="">
                <h4 class="font-bold text-xl">50 Issues</h4>
                <p class="text-zinc-400">Track and manage your project issues</p>
                
            </div>


         </div>
            <div>
                <p>
                    <img src="assets/Open-Status.png" alt=""> Open
                </p>
                <p> <img src="assets/Closed- Status .png" alt=""> Closed</p>
            </div>

        </section>




</div>



    
</body>
</html>
