<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="style.css">
    <title>Github issue Tracker</title>
</head>
















<body>
    <nav>
  <div class="navbar  mt-3 mx-auto bg-base-100 shadow-sm">
    
  
    <div class="flex-1">
      <a class="btn btn-ghost text-sm md:text-xl px-2">
        <img class="h-7 w-7 md:h-9 md:w-9" src="assets/github-logo.png" alt="">
        <span class="hidden sm:block">GitHub Issues Tracker</span>
      </a>
    </div>

  
    <div class="flex gap-2 items-center">

      <input id="search-input" type="text" placeholder="Search Issues..." 
             class="input input-bordered input-sm md:input-md w-24 sm:w-40 md:w-64" />
      <button onclick="searchIssues()" 
              class="btn btn-primary btn-sm md:btn-md text-xs md:text-sm">
        <span class="hidden sm:block">+ NEW ISSUES</span>
        <span class="sm:hidden">+</span>
      </button>

    
      <div class="dropdown dropdown-end">
        <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">

        </div>
        <ul tabindex="-1" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
          <li><a class="justify-between">Profile<span class="badge">New</span></a></li>
          <li><a>Settings</a></li>
          <li><a>Logout</a></li>
        </ul>
      </div>
    </div>

  </div>
</nav>



























<div class="">


  <header class="flex flex-wrap w-10/12 mx-auto mb-3 items-start mt-5 bg-white shadow-md p-4 gap-2">
    <button id="btn-all"    onclick="filterCards('all')"    class="btn btn-primary px-13">All</button>
    <button id="btn-open"   onclick="filterCards('open')"   class="btn btn-neutral btn-outline px-8">Open</button>
    <button id="btn-closed" onclick="filterCards('closed')" class="btn btn-neutral btn-outline px-5">Closed</button>
  </header>

  
  <section class="title p-3 mb-6 bg-white shadow-md w-10/12 mx-auto flex flex-col sm:flex-row justify-between gap-3">
    
    








    <div class="flex flex-row gap-2">
      <img class="rounded-full bg-gray-300 p-2 h-10 w-10" src="assets/Aperture.png" alt="">
      <div>
            <h4 id="issue-count" class="font-bold">50 Issues</h4>
        <p class="text-zinc-400 text-sm">Track and manage your project issues</p>
      </div>
    </div>

    
    <div class="flex gap-4 items-center">

              <p class="flex gap-1">🟢 Open</p>
      <p class="flex gap-1">🟣 Closed</p>
    </div>

  </section>

</div>




          <div id="spinner" class="flex justify-center items-center py-10">
           <span class="loading loading-spinner loading-lg text-primary"></span>
                      </div>



  
  



<div id="card-container" class="p-4 mb-3 shadow-md flex flex-wrap gap-3 w-10/12 mx-auto">

</div>














<div id="modal" class="fixed inset-0 bg-opacity-50 hidden flex items-center justify-center z-50 px-4">
  <div class="bg-white rounded-lg p-6 md:p-10 w-full sm:w-4/5 md:w-3/5 space-y-4 max-h-[90vh] overflow-y-auto">

  
    <h2 id="modal-title" class="font-bold text-lg md:text-xl"></h2>

  
    <div class="flex flex-wrap gap-3 mb-4 mt-2">
      <div id="modal-status" class="badge rounded-full px-3 badge-success">Open</div>
      <p id="modal-author" class="text-sm text-gray-500"></p>
    </div>

    
    <div id="modal-labels" class="flex flex-wrap gap-2"></div>

    
    <p id="modal-description" class="text-gray-600 text-sm md:text-base"></p>

    



    <div class="flex flex-col sm:flex-row gap-4">
      <div class="w-full sm:w-1/2">
        <p class="text-sm text-gray-400">Assignee:</p>
        <p id="modal-assignee" class="font-bold"></p>
      </div>
      <div class="w-full sm:w-1/2">



        <p class="text-sm text-gray-400 mb-2">Priority:</p>
        <div id="modal-priority" class="badge rounded-full badge-error"></div>
      </div>
    </div>

  
    <div class="flex items-end justify-end">

      <button onclick="closeModal()" class="btn px-4 btn-primary">Close</button>
    </div>

  </div>
</div>




<script>
  

   let allCards = [];












document.getElementById("spinner").classList.remove("hidden");

fetch("https://phi-lab-server.vercel.app/api/v1/lab/issues")
  .then(res => res.json())
  .then(data => {
    allCards = data.data;
    displayCard(allCards);


    document.getElementById("spinner").classList.add("hidden");
  });




 
  function displayCard(cards) {

    let cardContainer = document.getElementById("card-container");
    cardContainer.innerHTML = "";

    for (let card of cards) {

      let badgeHTML = "";

      if (card.priority === "high") {
        badgeHTML = `<div class="badge badge-soft badge-error px-4 rounded-full">HIGH</div>`;

      } else if (card.priority === "medium") {
        badgeHTML = `<div class="badge badge-soft badge-warning px-4 rounded-full">MEDIUM</div>`;

      } else {
        badgeHTML = `<div class="badge badge-soft px-4 rounded-full" style="background:#f3e8ff; color:#9333ea;">LOW</div>`;
      }

      
      let imgSrc = "";
      let borderColor = "";

      if (card.status === "closed") {
        imgSrc      = "assets/Closed- Status .png";
        borderColor = "border-t-purple-500 border-t-2";

      } else {
        imgSrc      = "assets/Open-Status.png";
        borderColor = "border-t-green-500 border-t-2";
      }

      let labelColors = {
        "bug"             : "badge-error",
        "help wanted"     : "badge-warning",
        "enhancement"     : "badge-success",
        "documentation"   : "badge-info",
        "good first issue": "badge-primary"
      };

      let labelsHTML = "";

      for (let label of card.labels.slice(0, 2)) {
        let color = labelColors[label];
        if (!color) {
          color = "badge-neutral";
        }
        labelsHTML += `<div class="badge badge-outline ${color} rounded-full whitespace-nowrap">${label.toUpperCase()}</div>`;
      }

    
      let date = new Date(card.createdAt).toLocaleDateString();

        
      cardContainer.innerHTML += `
        <div onclick="openModal(${card.id})" class="card space-y-2 w-96 p-2 shadow-xl border-t-2 ${borderColor} cursor-pointer hover:shadow-2xl">


          <div class="flex justify-between items-center">
            <img src="${imgSrc}" alt="status icon">
            ${badgeHTML}
          </div>

          <h2 class="font-bold text-lg">${card.title}</h2>

          <p class="text-gray-400 line-clamp-2">${card.description}</p>

          <div class="flex gap-2">
            ${labelsHTML}
          </div>

          <div class="my-2 border-t border-t-gray-400">
            <p class="text-sm text-gray-500 mb-1 mt-2">#${card.id} by ${card.author}</p>
            <p class="text-sm text-gray-500">${date}</p>
          </div>

        </div>
      `;
    }
  }




function filterCards(status) {

  
  document.getElementById("btn-all").className    = "btn btn-neutral px-8 btn-outline";
    document.getElementById("btn-open").className   = "btn btn-neutral px-8 btn-outline";
     
                  document.getElementById("btn-closed").className = "btn btn-neutral px-6 btn-outline";

  document.getElementById(`btn-${status}`).className = "btn btn-primary px-8";

 
                let filtered = [];

  if (status === "all") {
    filtered = allCards;

  } else {
    for (let card of allCards) {
      if (card.status === status) {
        filtered.push(card);
      }
    }
  }


  document.getElementById("issue-count").innerHTML = filtered.length + " Issues";




  displayCard(filtered);

};




 
function searchIssues() {



    
  document.getElementById("btn-all").className    = "btn btn-neutral px-13 btn-outline";
    document.getElementById("btn-open").className   = "btn btn-neutral px-8 btn-outline";
     
    document.getElementById("btn-closed").className = "btn btn-neutral px-5 btn-outline";

  
  let searchText = document.getElementById("search-input").value;


  fetch("https://phi-lab-server.vercel.app/api/v1/lab/issues/search?q=" + searchText)
    .then(res => res.json())
    .then(data => {
      displayCard(data.data);


            document.getElementById("issue-count").innerHTML = data.data.length + " Issues";

    });
}

















function openModal(id) {


  let card = allCards.find(c => c.id === id);

  
   document.getElementById("modal-title").innerHTML       = card.title;

  document.getElementById("modal-description").innerHTML = card.description;
document.getElementById("modal-author").innerHTML = "• Opened by " + card.author + " • " + new Date(card.createdAt).toLocaleDateString();
         
  
              document.getElementById("modal-assignee").innerHTML    = card.assignee || "None";

  document.getElementById("modal-priority").innerHTML    = card.priority.toUpperCase();


  if (card.status === "open") { 

    document.getElementById("modal-status").innerHTML  = "Opened";
    document.getElementById("modal-status").className  = "badge badge-success";
  } else {
    document.getElementById("modal-status").innerHTML  = "Closed";
           document.getElementById("modal-status").className  = "badge badge-error";
  }    









  let labelColors = {
    "bug"             : "badge-error",
    "help wanted"     : "badge-warning",
    "enhancement"     : "badge-success",
    "documentation"   : "badge-info",
    "good first issue": "badge-primary"
  };

  let labelsHTML = "";
  for (let label of card.labels) {
    let color = labelColors[label] || "badge-neutral";
    labelsHTML += `<div class="badge badge-outline ${color} rounded-full">${label.toUpperCase()}</div>`;
  }
  document.getElementById("modal-labels").innerHTML = labelsHTML;


  document.getElementById("modal").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}






</script>
</body>
</html>
